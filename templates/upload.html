{% extends 'base.html' %}
{% block content %}
<div class="upload-card">
  <h3>Upload a policy document</h3>
  <form method="post" enctype="multipart/form-data">
    <input type="file" name="file" />
    <button type="submit">Upload & Index</button>
  </form>
  <p>Supported: .txt, .pdf, .docx, .pptx</p>
</div>
{% endblock %}
