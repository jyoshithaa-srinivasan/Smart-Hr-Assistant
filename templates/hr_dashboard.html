{% extends 'base.html' %}
{% block content %}
<div class="hr-panel">
  <h2>HR Dashboard</h2>
  <a class="button" href="{{ url_for('upload') }}">Upload Document</a>
  <section class="uploads-list">
    <p>Uploaded documents will be indexed and available for search. Use the normal Ask box or the API to query.</p>
  </section>

  <div class="chat-container">
    <h3>Chat with HR Assistant</h3>
    <div id="hr-chat-box" class="chat-box"></div>

    <form id="hr-chat-form" enctype="multipart/form-data">
      <div class="input-box">
        <input id="hr-query" name="query" type="text" placeholder="Ask or attach a policy document..." />
        <input id="hr-file" name="file" type="file" accept=".pdf,.docx,.pptx,.txt" />
        <button type="submit" id="hr-ask-btn">Send</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
