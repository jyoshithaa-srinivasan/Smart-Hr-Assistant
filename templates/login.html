{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
  <h3>Login</h3>
  <form method="post">
    <label>Email</label>
    <input name="email" type="email" required>
    <label>Password</label>
    <input name="password" type="password" required>
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
